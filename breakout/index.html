<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>像素打砖块 - Breakout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <div class="hud">
        <span>分数: <span id="score">0</span></span>
        <span>生命: <span id="lives">3</span></span>
    </div>
    <canvas id="game" width="480" height="400"></canvas>
    <div class="menu" id="menu">
        <h1>打砖块</h1>
        <button class="btn" id="start">开始游戏</button>
        <p>←/→ 控制挡板移动</p>
        <p>空格发射球 | ESC 返回菜单</p>
    </div>
    <div class="over" id="over">
        <h2>游戏结束!</h2>
        <p>得分: <span id="final">0</span></p>
        <button class="btn" id="restart">再来一局</button>
    </div>
    <div class="win" id="win">
        <h2>通关!</h2>
        <p>得分: <span id="winScore">0</span></p>
        <button class="btn" id="winRestart">再来一局</button>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
