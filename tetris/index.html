<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>像素俄罗斯方块 - Tetris</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="game-container">
    <div class="left">
        <div class="hud">
            <div>分数: <span id="score">0</span></div>
            <div>等级: <span id="level">1</span></div>
            <div>消除: <span id="lines">0</span></div>
        </div>
        <canvas id="game" width="200" height="400"></canvas>
        <div class="menu" id="menu">
            <h1>俄罗斯方块</h1>
            <button class="btn" id="start">开始游戏</button>
            <p>←/→ 移动 | ↑ 旋转 | ↓ 加速</p>
            <p>空格硬降 | ESC 返回菜单</p>
        </div>
        <div class="over" id="over">
            <h2>游戏结束!</h2>
            <p>得分: <span id="final">0</span></p>
            <button class="btn" id="restart">再来一局</button>
        </div>
    </div>
    <div class="right">
        <div class="next-title">下一个</div>
        <canvas id="next" width="100" height="100"></canvas>
        <div class="controls">
            <div>← → 移动</div>
            <div>↑ 旋转</div>
            <div>↓ 加速</div>
            <div>空格 硬降</div>
        </div>
    </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
